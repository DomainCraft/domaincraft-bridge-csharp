name: csharp-restful
description: C# REST API bridge for DomainCraft (EF Core + PostgreSQL + JWT)
version: "1.0.0"
output_dir: generated
helpers: templates/_helpers.cs.tmpl

# Package registry URL for auto-resolving versions. {id} is replaced with lowercase package ID.
# Returns JSON: {"versions": ["1.0.0", "1.0.1", ...]}
registry_url: "https://api.nuget.org/v3-flatcontainer/{id}/index.json"

# Maps logical package key → registry package ID.
# Used to auto-resolve latest stable versions from the package registry.
registry_packages:
  ef_core: Microsoft.EntityFrameworkCore
  ef_core_design: Microsoft.EntityFrameworkCore.Design
  ef_core_relational: Microsoft.EntityFrameworkCore.Relational
  npgsql_ef: Npgsql.EntityFrameworkCore.PostgreSQL
  stackexchange_redis: StackExchange.Redis
  redis_cache: Microsoft.Extensions.Caching.StackExchangeRedis
  logging_abstractions: Microsoft.Extensions.Logging.Abstractions
  di_abstractions: Microsoft.Extensions.DependencyInjection.Abstractions
  jwt_bearer: Microsoft.AspNetCore.Authentication.JwtBearer
  identity_model: Microsoft.IdentityModel.Tokens
  swashbuckle: Swashbuckle.AspNetCore
  swashbuckle_annotations: Swashbuckle.AspNetCore.Annotations
  healthchecks_npgsql: AspNetCore.HealthChecks.NpgSql
  healthchecks_redis: AspNetCore.HealthChecks.Redis
  json_serialization: System.Text.Json
  di_extensions: Microsoft.Extensions.DependencyInjection
  test_sdk: Microsoft.NET.Test.Sdk
  xunit: xunit
  xunit_runner: xunit.runner.visualstudio
  ef_core_inmemory: Microsoft.EntityFrameworkCore.InMemory
  mvc_testing: Microsoft.AspNetCore.Mvc.Testing

# Supported configurations
supports:
  - api_style: rest
  - database: postgresql
  - auth: jwt
  - multi_tenancy: "none"

templates:
  # ===== DOMAIN ENTITIES & SHARED =====
  - for: entity
    source: templates/entity.cs.tmpl
    target: "src/Domain/Entities/{{ .Entity.Name }}.cs"

  - for: project
    source: templates/enums.cs.tmpl
    target: "src/Domain/Shared/Enums.cs"
    when: hasEnums

  # ===== INFRASTRUCTURE PERSISTENCE =====
  - for: project
    source: templates/dbcontext.cs.tmpl
    target: "src/Infrastructure/Persistence/DomainDbContext.cs"

  - for: entity
    source: templates/entity-configuration.cs.tmpl
    target: "src/Infrastructure/Persistence/Configurations/{{ .Entity.Name }}Configuration.cs"

  - for: project
    source: templates/seed-seeder.cs.tmpl
    target: "src/Infrastructure/Persistence/Seeders/DomainSeeder.cs"
    when: hasSeed

  # ===== APPLICATION REPOSITORIES (interfaces) =====
  - for: entity
    source: templates/irepository.cs.tmpl
    target: "src/Application/Repositories/I{{ .Entity.Name }}Repository.cs"

  - for: project
    source: templates/irepository-base.cs.tmpl
    target: "src/Application/Repositories/IRepository.cs"

  # ===== INFRASTRUCTURE REPOSITORIES (EF Core implementations) =====
  - for: entity
    source: templates/repository-impl.cs.tmpl
    target: "src/Infrastructure/Repositories/{{ .Entity.Name }}Repository.cs"

  - for: project
    source: templates/infrastructure-di.cs.tmpl
    target: "src/Infrastructure/DependencyInjection.cs"

  # ===== APPLICATION HANDLERS / SERVICES =====
  - for: project
    source: templates/permissions.cs.tmpl
    target: "src/Application/Security/PermissionPolicies.cs"
    when: hasPermissions

  - for: project
    source: templates/IPermissionService.cs.tmpl
    target: "src/Application/Security/IPermissionService.cs"
    when: hasPermissions

  - for: project
    source: templates/PermissionService.cs.tmpl
    target: "src/Application/Security/PermissionService.cs"
    when: hasPermissions

  - for: project
    source: templates/IOwnerResolver.cs.tmpl
    target: "src/Application/Security/IOwnerResolver.cs"
    when: hasOwnerTokens

  - for: project
    source: templates/OwnerResolver.cs.tmpl
    target: "src/Application/Security/OwnerResolver.cs"
    when: hasOwnerTokens

  - for: project
    source: templates/service-registration.cs.tmpl
    target: "src/Application/DependencyInjection.cs"

  # ===== CACHING =====
  - for: project
    source: templates/icache-service.cs.tmpl
    target: "src/Application/Caching/ICacheService.cs"

  - for: project
    source: templates/redis-cache.cs.tmpl
    target: "src/Infrastructure/Caching/RedisCacheService.cs"

  # ===== HEALTH CHECKS =====
  - for: project
    source: templates/health-checks.cs.tmpl
    target: "src/WebApi/HealthChecks/HealthCheckResponseWriter.cs"

  # ===== REST API CONTROLLERS =====
  - for: entity
    source: templates/controller.cs.tmpl
    target: "src/WebApi/Controllers/{{ pluralize .Entity.Name }}Controller.cs"

  # ===== PROJECT FILES =====
  - for: project
    source: templates/domain.csproj.tmpl
    target: "src/Domain/Domain.csproj"

  - for: project
    source: templates/infrastructure.csproj.tmpl
    target: "src/Infrastructure/Infrastructure.csproj"

  - for: project
    source: templates/application.csproj.tmpl
    target: "src/Application/Application.csproj"

  - for: project
    source: templates/webapi.csproj.tmpl
    target: "src/WebApi/WebApi.csproj"

  - for: project
    source: templates/Program.cs.tmpl
    target: "src/WebApi/Program.cs"

  - for: project
    source: templates/appsettings.json.tmpl
    target: "src/WebApi/appsettings.json"

  # ===== DOCUMENTATION =====
  - for: entity
    source: templates/entity-summary.md.tmpl
    target: "docs/Entities/{{ .Entity.Name }}.md"

  - for: project
    source: templates/project-summary.md.tmpl
    target: "docs/ProjectSummary.md"

  - for: project
    source: templates/solution.sln.tmpl
    target: "{{ .Project.Name | pascalcase }}.sln"

  # ===== TESTS =====
  - for: project
    source: templates/tests.cs.tmpl
    target: "tests/ApiTests.cs"

  - for: project
    source: templates/tests.csproj.tmpl
    target: "tests/{{ .Project.Name | pascalcase }}.Tests.csproj"

  # ===== DOCKER =====
  - for: project
    source: templates/Dockerfile.tmpl
    target: "Dockerfile"

  - for: project
    source: templates/docker-compose.yml.tmpl
    target: "docker-compose.yml"
