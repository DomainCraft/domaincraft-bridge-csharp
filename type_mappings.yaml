types:
  # Primitives
  string: "string"
  int: "int"
  bigint: "long"
  float: "double"
  decimal: "decimal"
  boolean: "bool"

  # Date/Time
  date: "DateTime"
  datetime: "DateTime"

  # UUID
  uuid: "Guid"

  # JSON
  json: "JsonDocument"
  jsonb: "JsonDocument"

  # Text (long strings)
  text: "string"

  # Array types
  "array(string)": "List<string>"
  "array(int)": "List<int>"
  "array(bigint)": "List<long>"
  "array(float)": "List<double>"
  "array(decimal)": "List<decimal>"
  "array(boolean)": "List<bool>"
  "array(uuid)": "List<Guid>"
  "array(datetime)": "List<DateTime>"
  "array(date)": "List<DateTime>"

# Value types that require nullable suffix (?) for null values
value_types:
  - "int"
  - "long"
  - "double"
  - "decimal"
  - "bool"
  - "DateTime"
  - "Guid"

# Delete behaviors
behaviors:
  cascade: "Cascade"
  set_null: "SetNull"
  restrict: "Restrict"
  no_action: "NoAction"

# How the bridge formats array types — %s is replaced with the element type
array_format: "List<%s>"

# How the bridge handles nullable types — %s is replaced with the type name
# C# uses "?" suffix, Python could use "Optional[%s]", etc.
nullable_format: "?"

# How the bridge handles enum types (stored as raw names in IR)
enum_nullable: true
