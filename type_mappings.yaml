types:
  # Primitives
  string: "string"
  int: "int"
  bigint: "long"
  float: "double"
  decimal: "decimal"
  boolean: "bool"

  # Date/Time
  date: "DateTime"
  datetime: "DateTime"

  # UUID
  uuid: "Guid"

  # JSON
  json: "JsonDocument"
  jsonb: "JsonDocument"

  # Text (long strings)
  text: "string"

  # Array types
  "array(string)": "List<string>"
  "array(int)": "List<int>"
  "array(bigint)": "List<long>"
  "array(float)": "List<double>"
  "array(decimal)": "List<decimal>"
  "array(boolean)": "List<bool>"

# Value types that require nullable suffix (?) for null values
value_types:
  - "int"
  - "long"
  - "double"
  - "decimal"
  - "bool"
  - "DateTime"
  - "Guid"

# Delete behaviors
behaviors:
  cascade: "Cascade"
  set_null: "SetNull"
  restrict: "Restrict"
  no_action: "NoAction"

# Database mappings (PostgreSQL specific)
database_types:
  string: "VARCHAR(255)"
  int: "INTEGER"
  long: "BIGINT"
  double: "DOUBLE PRECISION"
  decimal: "NUMERIC"
  bool: "BOOLEAN"
  DateTime: "TIMESTAMP"
  text: "TEXT"
  json: "JSONB"
  Guid: "UUID"
